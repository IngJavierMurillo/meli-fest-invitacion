<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Meli Fest · Invitación</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: "Courier New", ui-monospace, monospace;
  background: #210011;
}

/* Pantalla completa */
.viewport {
  width: 100vw;
  height: 100vh;
  display: grid;
  place-items: center;
  overflow: hidden;
  background:
    radial-gradient(
      120% 90% at 50% 25%,
      #350019 0%,
      #170008 58%,
      #070004 100%
    );
}

/* Contenedor estable 9:16 */
.stage {
  position: relative;
  width: min(100vw, calc(100vh * 941 / 1672));
  aspect-ratio: 941 / 1672;
  overflow: hidden;
  background: #f6c6d8;
  box-shadow:
    0 30px 90px rgba(0, 0, 0, 0.65),
    0 0 0 1px rgba(255, 180, 215, 0.15);
  container-type: size;
}

/* Imagen base: nunca se mueve */
.base-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  pointer-events: none;
  user-select: none;
  transform: none !important;
  animation: none !important;
  transition: none !important;
  filter: none !important;
}

/* ============================================================
   LCD DEL CELULAR — AJUSTE FINAL
   ============================================================ */

.screen {
  --screen-rot: -7deg;
  --msg-font: clamp(8px, 16.2cqw, 16px);

  position: absolute;

  /* Coordenadas corregidas */
  left: 18.05%;
  top: 52.95%;
  width: 16.45%;
  height: 13.10%;

  border-radius: 5px;
  overflow: hidden;
  transform: rotate(var(--screen-rot));
  transform-origin: center center;

  background: #151014;
  border: 1px solid rgba(12, 12, 16, 0.9);

  box-shadow:
    inset 0 0 10px rgba(0, 0, 0, 0.65),
    inset 0 0 24px rgba(255, 255, 255, 0.05);

  container-type: size;
  z-index: 5;
}

/* LCD encendido */
.screen.on {
  background:
    repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.055) 0,
      rgba(0, 0, 0, 0.055) 1px,
      transparent 1px,
      transparent 3px
    ),
    linear-gradient(
      180deg,
      #eef8f3 0%,
      #e7f2ec 50%,
      #f2dcea 100%
    );

  box-shadow:
    inset 0 0 10px rgba(0, 0, 0, 0.34),
    inset 0 0 22px rgba(255, 255, 255, 0.32),
    0 0 12px rgba(255, 120, 190, 0.32);

  animation: powerOn 0.9s ease-out;
}

/* Al terminar, se desvanece el overlay y queda visible la pantalla original */
.screen.fadeout {
  opacity: 0;
  transition: opacity 0.45s ease;
}

.screen.waiting {
  animation:
    powerOn 0.9s ease-out,
    flicker 1.15s ease-in-out 0.95s infinite,
    screenBuzz 0.09s linear infinite;
}

@keyframes powerOn {
  0% { filter: brightness(0.15); }
  12% { filter: brightness(1.45); }
  20% { filter: brightness(0.42); }
  32% { filter: brightness(1.2); }
  45% { filter: brightness(0.72); }
  100% { filter: brightness(1); }
}

@keyframes flicker {
  0%, 100% { filter: brightness(1); }
  45% { filter: brightness(0.88); }
  55% { filter: brightness(1.08); }
}

@keyframes screenBuzz {
  0% {
    transform: rotate(var(--screen-rot)) translate(0.35px, -0.2px);
  }
  25% {
    transform: rotate(var(--screen-rot)) translate(-0.3px, 0.25px);
  }
  50% {
    transform: rotate(var(--screen-rot)) translate(0.28px, 0.2px);
  }
  75% {
    transform: rotate(var(--screen-rot)) translate(-0.25px, -0.2px);
  }
  100% {
    transform: rotate(var(--screen-rot)) translate(0.3px, -0.15px);
  }
}

/* Interior del LCD */
.screen-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: 1.2cqw 2.1cqw 0.8cqw;
  opacity: 0;
  color: #141018;
}

.screen.on .screen-inner {
  opacity: 1;
}

/* Barra superior del celular */
.statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: clamp(4px, 4.3cqw, 8px);
  color: #1f1720;
  margin-bottom: 0.15cqw;
  height: 4.8cqw;
  flex: 0 0 auto;
}

.sig {
  font-size: clamp(4px, 4.2cqw, 8px);
  letter-spacing: -0.35cqw;
}

.bat {
  display: inline-block;
  width: 6.7cqw;
  height: 3.7cqw;
  border: 0.55cqw solid #201721;
  border-radius: 0.8cqw;
  position: relative;
  background: linear-gradient(90deg, #201721 72%, transparent 72%);
}

.bat::after {
  content: "";
  position: absolute;
  right: -1.15cqw;
  top: 0.7cqw;
  width: 0.85cqw;
  height: 1.35cqw;
  background: #201721;
  border-radius: 0 0.5cqw 0.5cqw 0;
}

/* Texto del mensaje */
.msgbody {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
  font-weight: 900;
  font-size: var(--msg-font);
  line-height: 1.02;
  letter-spacing: -0.28cqw;
  color: #171017;
  text-shadow: 0.16cqw 0.16cqw 0 rgba(255, 255, 255, 0.35);

  min-height: 0;
}

.mline {
  white-space: nowrap;
}

.mline.long {
  font-size: 0.72em;
  letter-spacing: -0.55cqw;
}

.mline.medium {
  font-size: 0.85em;
}

/* Iconos inferiores */
.iconrow {
  height: 5.6cqw;
  flex: 0 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 2.2cqw;
  color: #ff3ea0;
  font-size: clamp(5px, 6.2cqw, 11px);
  opacity: 0;
}

.screen.on .iconrow {
  opacity: 1;
}

.iconrow .env {
  font-size: clamp(4px, 5.1cqw, 10px);
  color: #67505d;
}

.iconrow .h2 {
  letter-spacing: -1.3cqw;
}

/* Notificación de espera */
.notif {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.4cqw;
  opacity: 0;
  pointer-events: none;
  color: #211420;
}

.screen.waiting .notif {
  opacity: 1;
  animation: notifPulse 1.05s ease-in-out infinite;
}

.env-big {
  font-size: clamp(11px, 13.2cqw, 24px);
  color: #ff3ea0;
  text-shadow: 0 0 5cqw rgba(255, 62, 160, 0.6);
  line-height: 1;
}

.notif-text {
  width: 100%;
  text-align: center;
  white-space: nowrap;
  font-weight: 900;
  font-size: clamp(8px, 8.8cqw, 16px);
  letter-spacing: -0.15cqw;
}

.dots::after {
  content: "";
  animation: dots 1.2s steps(4, end) infinite;
}

@keyframes dots {
  0% { content: ""; }
  25% { content: "."; }
  50% { content: ".."; }
  75% { content: "..."; }
}

@keyframes notifPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

/* Glow alrededor del LCD */
.screen-glow {
  position: absolute;
  left: 17.45%;
  top: 52.35%;
  width: 17.65%;
  height: 14.20%;
  border-radius: 10px;
  pointer-events: none;
  opacity: 0;
  z-index: 4;
  box-shadow:
    0 0 18px 5px rgba(255, 120, 190, 0.42),
    0 0 38px 11px rgba(255, 120, 190, 0.20);
  transform: rotate(-7deg);
}

.screen-glow.active {
  opacity: 1;
  animation: glowPulse 2.2s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.38; }
  50% { opacity: 0.85; }
}

/* Brillos */
.sparkles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 6;
}

.sparkle {
  position: absolute;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  line-height: 1;
  text-shadow: 0 0 7px currentColor;
  will-change: transform, opacity;
}

.sparkles.active .sparkle {
  animation: twinkle var(--dur, 2.6s) ease-in-out var(--delay, 0s) infinite;
}

@keyframes twinkle {
  0%, 100% {
    transform: translate(-50%, -50%) scale(0) rotate(0);
    opacity: 0;
  }
  40% {
    transform: translate(-50%, -50%) scale(1) rotate(25deg);
    opacity: 1;
  }
  70% {
    transform: translate(-50%, -50%) scale(0.8) rotate(-15deg);
    opacity: 0.7;
  }
}

/* Intro */
.intro {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3cqw;
  background:
    radial-gradient(
      120% 80% at 50% 40%,
      rgba(28, 6, 18, 0.48),
      rgba(14, 2, 7, 0.82)
    );
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: 20;
  transition: opacity 0.55s ease;
  padding: 8cqw;
}

.intro.hide {
  opacity: 0;
  pointer-events: none;
}

.kicker {
  color: #ffb9dd;
  letter-spacing: 0.65cqw;
  font-size: 2.4cqw;
  text-transform: uppercase;
}

.brand {
  font-family: Georgia, "Times New Roman", serif;
  font-style: italic;
  font-weight: 900;
  color: #fff;
  font-size: 10.5cqw;
  line-height: 0.92;
  text-align: center;
  text-shadow:
    0 2px 0 #ff3ea0,
    0 0 30px rgba(255, 62, 160, 0.6);
}

.brand span {
  display: block;
}

.start-btn {
  margin-top: 1cqw;
  border: none;
  cursor: pointer;
  font-family: "Courier New", monospace;
  font-weight: 900;
  font-size: 3.7cqw;
  letter-spacing: 0.1cqw;
  color: #4a0322;
  padding: 2.8cqw 5.8cqw;
  border-radius: 999px;
  background:
    linear-gradient(
      180deg,
      #ffd3ea 0%,
      #ff8fc4 45%,
      #ff4fa2 100%
    );
  box-shadow:
    0 0 0 0.4cqw rgba(255, 255, 255, 0.55),
    0 0 0 0.9cqw rgba(255, 79, 162, 0.35),
    0 16px 40px rgba(255, 79, 162, 0.5),
    inset 0 3px 8px rgba(255, 255, 255, 0.7);
  animation: btnBreathe 2.2s ease-in-out infinite;
}

.start-btn .sub {
  display: block;
  font-size: 2cqw;
  font-weight: 700;
  letter-spacing: 0.2cqw;
  margin-top: 0.4cqw;
  color: #7a0940;
  text-transform: uppercase;
}

@keyframes btnBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

.audio-note {
  position: absolute;
  left: 50%;
  bottom: 3cqw;
  transform: translateX(-50%);
  z-index: 30;
  background: rgba(20, 4, 12, 0.82);
  color: #ffcfe6;
  border: 1px solid rgba(255, 120, 190, 0.5);
  font-size: 2.4cqw;
  padding: 1.3cqw 2.4cqw;
  border-radius: 999px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  white-space: nowrap;
}

.audio-note.show {
  opacity: 1;
  pointer-events: auto;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="viewport">
  <div class="stage" id="stage">

    <img class="base-image" src="assets/meli-bg.png" alt="Meli Fest" />

    <div class="screen-glow" id="screenGlow"></div>

    <div class="screen" id="screen">
      <div class="screen-inner">
        <div class="statusbar">
          <span class="sig">▮▮▮▪</span>
          <span class="bat"></span>
        </div>

        <div class="msgbody" id="msgbody"></div>

        <div class="iconrow">
          <span>♥</span>
          <span class="env">✉</span>
          <span class="h2">♥♥</span>
        </div>
      </div>

      <div class="notif" id="notif">
        <span class="env-big">✉</span>
        <div class="notif-text">
          New message<span class="dots"></span>
        </div>
      </div>
    </div>

    <div class="sparkles" id="sparkles"></div>

    <div class="intro" id="intro">
      <div class="kicker">You're invited</div>
      <div class="brand">
        <span>MELI</span>
        <span>FEST</span>
      </div>

      <button class="start-btn" id="startBtn">
        Abrir mensaje ♥
        <span class="sub">Play Meli Fest</span>
      </button>
    </div>

    <div class="audio-note" id="audioNote">
      ♪ Toca para activar el sonido
    </div>

  </div>
</div>

<audio id="audio" preload="auto" src="assets/meli-song.mp3"></audio>

<script>
const AUDIO_START_TIME = 10;
const MESSAGE_DELAY = 6000;

const SCREEN_LINES = [
  "New message...",
  "You're invited",
  "Meli fest",
  "15/08/26",
  "5:00 pm",
  "Dress code:",
  "2000's party"
];

const TYPE_SPEED = 42;
const LINE_DELAY = 150;

const screenEl = document.getElementById("screen");
const screenGlow = document.getElementById("screenGlow");
const msgbody = document.getElementById("msgbody");
const intro = document.getElementById("intro");
const startBtn = document.getElementById("startBtn");
const audio = document.getElementById("audio");
const audioNote = document.getElementById("audioNote");
const sparklesBox = document.getElementById("sparkles");

/* Brillos */
const SPOTS = [
  [24, 55, "✦", "#fff", 2.8],
  [12, 62, "✧", "#ff6fb5", 2.1],
  [39, 53, "✦", "#ffd6ec", 2.3],
  [18, 78, "❤", "#ff3ea0", 1.7],
  [30, 84, "✦", "#fff", 1.9],
  [10, 88, "✧", "#c9c9d6", 2.3],
  [43, 90, "✦", "#ff6fb5", 2.1],
  [22, 92, "✧", "#fff", 1.7],
  [8, 50, "✦", "#ffd6ec", 1.9],
  [50, 62, "❤", "#ff3ea0", 1.5],
  [78, 52, "✦", "#fff", 2.6],
  [90, 60, "✧", "#ff6fb5", 2.1],
  [82, 78, "❤", "#ff3ea0", 1.7],
  [70, 30, "✦", "#ffd6ec", 2.3],
  [88, 22, "✧", "#fff", 1.9],
  [58, 20, "✦", "#ff6fb5", 1.9],
  [46, 12, "✧", "#fff", 2.1],
  [30, 18, "✦", "#ffd6ec", 2.3],
  [86, 90, "✦", "#fff", 2.3]
];

SPOTS.forEach((sp, i) => {
  const el = document.createElement("span");
  el.className = "sparkle";
  el.textContent = sp[2];
  el.style.left = sp[0] + "%";
  el.style.top = sp[1] + "%";
  el.style.color = sp[3];
  el.style.fontSize = sp[4] + "cqw";
  el.style.setProperty("--dur", (2.2 + (i % 5) * 0.4) + "s");
  el.style.setProperty("--delay", ((i % 7) * 0.35) + "s");
  sparklesBox.appendChild(el);
});

function classify(text) {
  if (text.length > 13) return " long";
  if (text.length > 10) return " medium";
  return "";
}

function typeLines(lines, el, done) {
  el.innerHTML = "";
  let li = 0;

  function nextLine() {
    if (li >= lines.length) {
      if (typeof done === "function") done();
      return;
    }

    const div = document.createElement("div");
    div.className = "mline" + classify(lines[li]);
    el.appendChild(div);

    const txt = lines[li];
    let ci = 0;

    function typeChar() {
      div.textContent = txt.slice(0, ci);
      ci++;

      if (ci <= txt.length) {
        setTimeout(typeChar, TYPE_SPEED);
      } else {
        li++;
        setTimeout(nextLine, LINE_DELAY);
      }
    }

    typeChar();
  }

  nextLine();
}

async function playAudio() {
  try {
    if (audio.readyState < 1) {
      await new Promise((resolve) => {
        audio.addEventListener("loadedmetadata", resolve, { once: true });
        setTimeout(resolve, 1500);
      });
    }

    try {
      audio.currentTime = AUDIO_START_TIME;
    } catch (e) {}

    await audio.play();

    if (audio.currentTime < AUDIO_START_TIME - 1) {
      try {
        audio.currentTime = AUDIO_START_TIME;
      } catch (e) {}
    }

  } catch (error) {
    console.warn("Audio no disponible, la animación continúa.", error);
    showAudioNote();
  }
}

function showAudioNote() {
  audioNote.classList.add("show");

  audioNote.onclick = async () => {
    try {
      audio.currentTime = AUDIO_START_TIME;
      await audio.play();
      audioNote.classList.remove("show");
    } catch (e) {}
  };

  setTimeout(() => {
    audioNote.classList.remove("show");
  }, 6000);
}

function startExperience() {
  startBtn.disabled = true;
  intro.classList.add("hide");

  playAudio();

  screenEl.classList.add("on", "waiting");
  screenGlow.classList.add("active");
  sparklesBox.classList.add("active");

  setTimeout(revealMessage, MESSAGE_DELAY);
}

function revealMessage() {
  screenEl.classList.remove("waiting");
  screenEl.classList.add("revealed");

  typeLines(SCREEN_LINES, msgbody, function () {
    setTimeout(function () {
      screenEl.classList.add("fadeout");
    }, 850);
  });
}

startBtn.addEventListener("click", startExperience);
</script>
</body>
</html>
