<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Meli Fest · Invitación</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}body{font-family:"Courier New",ui-monospace,monospace;background:#210011}.viewport{width:100vw;height:100vh;display:grid;place-items:center;overflow:hidden;background:radial-gradient(120% 90% at 50% 25%,#350019 0%,#170008 58%,#070004 100%)}.stage{position:relative;width:min(100vw,calc(100vh * 941 / 1672));aspect-ratio:941/1672;overflow:hidden;background:#f6c6d8;box-shadow:0 30px 90px rgba(0,0,0,.65),0 0 0 1px rgba(255,180,215,.15);container-type:size}.base-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;pointer-events:none;user-select:none;transform:none!important;animation:none!important;transition:none!important;filter:none!important}

/* LCD del celular. Ajuste fino: solo modifica estas variables. */
.screen{--screen-rot:-8deg;--msg-font:15.8cqw;position:absolute;left:15.45%;top:50.95%;width:15.95%;height:12.25%;border-radius:4px;overflow:hidden;transform:rotate(var(--screen-rot));transform-origin:center center;background:#151014;border:1px solid rgba(12,12,16,.9);box-shadow:inset 0 0 10px rgba(0,0,0,.65),inset 0 0 24px rgba(255,255,255,.05);container-type:size;z-index:5}.screen.on{background:repeating-linear-gradient(0deg,rgba(0,0,0,.055) 0,rgba(0,0,0,.055) 1px,transparent 1px,transparent 3px),linear-gradient(180deg,#eef8f3 0%,#e7f2ec 50%,#f2dcea 100%);box-shadow:inset 0 0 10px rgba(0,0,0,.34),inset 0 0 22px rgba(255,255,255,.32),0 0 12px rgba(255,120,190,.32);animation:powerOn .9s ease-out}.screen.waiting{animation:powerOn .9s ease-out,flicker 1.15s ease-in-out .95s infinite,screenBuzz .09s linear infinite}@keyframes powerOn{0%{filter:brightness(.15)}12%{filter:brightness(1.45)}20%{filter:brightness(.42)}32%{filter:brightness(1.2)}45%{filter:brightness(.72)}100%{filter:brightness(1)}}@keyframes flicker{0%,100%{filter:brightness(1)}45%{filter:brightness(.88)}55%{filter:brightness(1.08)}}@keyframes screenBuzz{0%{transform:rotate(var(--screen-rot)) translate(.45px,-.25px)}25%{transform:rotate(var(--screen-rot)) translate(-.4px,.35px)}50%{transform:rotate(var(--screen-rot)) translate(.35px,.25px)}75%{transform:rotate(var(--screen-rot)) translate(-.35px,-.25px)}100%{transform:rotate(var(--screen-rot)) translate(.4px,-.2px)}}
.screen-inner{position:absolute;inset:0;display:flex;flex-direction:column;padding:1.8cqw 2.6cqw 1.2cqw;opacity:0;color:#141018}.screen.on .screen-inner{opacity:1}.statusbar{display:flex;justify-content:space-between;align-items:center;font-size:4.7cqw;color:#1f1720;margin-bottom:.45cqw;height:5.6cqw;flex:0 0 auto}.sig{font-size:4.7cqw;letter-spacing:-.35cqw}.bat{display:inline-block;width:7.6cqw;height:4.1cqw;border:.6cqw solid #201721;border-radius:.9cqw;position:relative;background:linear-gradient(90deg,#201721 72%,transparent 72%)}.bat:after{content:"";position:absolute;right:-1.35cqw;top:.8cqw;width:.95cqw;height:1.5cqw;background:#201721;border-radius:0 .5cqw .5cqw 0}.msgbody{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-weight:900;font-size:var(--msg-font);line-height:1.02;letter-spacing:-.32cqw;color:#171017;text-shadow:.18cqw .18cqw 0 rgba(255,255,255,.3);min-height:0}.mline{white-space:nowrap}.mline.long{font-size:.78em;letter-spacing:-.55cqw}.mline.medium{font-size:.88em}.iconrow{height:6.6cqw;flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 2.8cqw;color:#ff3ea0;font-size:6.9cqw;opacity:0}.screen.on .iconrow{opacity:1}.iconrow .env{font-size:5.8cqw;color:#67505d}.iconrow .h2{letter-spacing:-1.5cqw}.notif{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3.2cqw;opacity:0;pointer-events:none;color:#211420}.screen.waiting .notif{opacity:1;animation:notifPulse 1.05s ease-in-out infinite}.env-big{font-size:20cqw;color:#ff3ea0;text-shadow:0 0 5cqw rgba(255,62,160,.6);line-height:1}.notif-text{font-weight:900;font-size:13.5cqw;letter-spacing:-.5cqw}.dots:after{content:"";animation:dots 1.2s steps(4,end) infinite}@keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}@keyframes notifPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.screen-glow{position:absolute;left:14.8%;top:50.2%;width:17.5%;height:13.8%;border-radius:14px;pointer-events:none;opacity:0;z-index:4;box-shadow:0 0 24px 7px rgba(255,120,190,.48),0 0 52px 16px rgba(255,120,190,.22);transform:rotate(-8deg)}.screen-glow.active{opacity:1;animation:glowPulse 2.2s ease-in-out infinite}@keyframes glowPulse{0%,100%{opacity:.45}50%{opacity:1}}
.sparkles{position:absolute;inset:0;pointer-events:none;z-index:6}.sparkle{position:absolute;transform:translate(-50%,-50%) scale(0);opacity:0;line-height:1;text-shadow:0 0 7px currentColor;will-change:transform,opacity}.sparkles.active .sparkle{animation:twinkle var(--dur,2.6s) ease-in-out var(--delay,0s) infinite}@keyframes twinkle{0%,100%{transform:translate(-50%,-50%) scale(0) rotate(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1) rotate(25deg);opacity:1}70%{transform:translate(-50%,-50%) scale(.8) rotate(-15deg);opacity:.7}}
.intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3cqw;background:radial-gradient(120% 80% at 50% 40%,rgba(28,6,18,.48),rgba(14,2,7,.82));backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:20;transition:opacity .55s ease;padding:8cqw}.intro.hide{opacity:0;pointer-events:none}.kicker{color:#ffb9dd;letter-spacing:.65cqw;font-size:2.4cqw;text-transform:uppercase}.brand{font-family:Georgia,"Times New Roman",serif;font-style:italic;font-weight:900;color:#fff;font-size:10.5cqw;line-height:.92;text-align:center;text-shadow:0 2px 0 #ff3ea0,0 0 30px rgba(255,62,160,.6)}.brand span{display:block}.start-btn{margin-top:1cqw;border:none;cursor:pointer;font-family:"Courier New",monospace;font-weight:900;font-size:3.7cqw;letter-spacing:.1cqw;color:#4a0322;padding:2.8cqw 5.8cqw;border-radius:999px;background:linear-gradient(180deg,#ffd3ea 0%,#ff8fc4 45%,#ff4fa2 100%);box-shadow:0 0 0 .4cqw rgba(255,255,255,.55),0 0 0 .9cqw rgba(255,79,162,.35),0 16px 40px rgba(255,79,162,.5),inset 0 3px 8px rgba(255,255,255,.7);animation:btnBreathe 2.2s ease-in-out infinite}.start-btn .sub{display:block;font-size:2cqw;font-weight:700;letter-spacing:.2cqw;margin-top:.4cqw;color:#7a0940;text-transform:uppercase}@keyframes btnBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}.audio-note{position:absolute;left:50%;bottom:3cqw;transform:translateX(-50%);z-index:30;background:rgba(20,4,12,.82);color:#ffcfe6;border:1px solid rgba(255,120,190,.5);font-size:2.4cqw;padding:1.3cqw 2.4cqw;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .4s ease;white-space:nowrap}.audio-note.show{opacity:1;pointer-events:auto;cursor:pointer}
</style>
</head>
<body>
<div class="viewport"><div class="stage" id="stage">
  <img class="base-image" src="assets/meli-bg.png" alt="Meli Fest" />
  <div class="screen-glow" id="screenGlow"></div>
  <div class="screen" id="screen">
    <div class="screen-inner">
      <div class="statusbar"><span class="sig">▮▮▮▪</span><span class="bat"></span></div>
      <div class="msgbody" id="msgbody"></div>
      <div class="iconrow"><span>♥</span><span class="env">✉</span><span class="h2">♥♥</span></div>
    </div>
    <div class="notif" id="notif"><span class="env-big">✉</span><div class="notif-text">New message<span class="dots"></span></div></div>
  </div>
  <div class="sparkles" id="sparkles"></div>
  <div class="intro" id="intro"><div class="kicker">You're invited</div><div class="brand"><span>MELI</span><span>FEST</span></div><button class="start-btn" id="startBtn">Abrir mensaje ♥<span class="sub">Play Meli Fest</span></button></div>
  <div class="audio-note" id="audioNote">♪ Toca para activar el sonido</div>
</div></div>
<audio id="audio" preload="auto" src="assets/meli-song.mp3"></audio>
<script>
const AUDIO_START_TIME=10;
const MESSAGE_DELAY=6000;
const SCREEN_LINES=["New message...","You're invited","Meli fest","15/08/26","5:00 pm","Dress code:","2000's party"];
const TYPE_SPEED=42;
const LINE_DELAY=150;
const screenEl=document.getElementById('screen'),screenGlow=document.getElementById('screenGlow'),msgbody=document.getElementById('msgbody'),intro=document.getElementById('intro'),startBtn=document.getElementById('startBtn'),audio=document.getElementById('audio'),audioNote=document.getElementById('audioNote'),sparklesBox=document.getElementById('sparkles');
const SPOTS=[[24,55,'✦','#fff',2.8],[12,62,'✧','#ff6fb5',2.1],[39,53,'✦','#ffd6ec',2.3],[18,78,'❤','#ff3ea0',1.7],[30,84,'✦','#fff',1.9],[10,88,'✧','#c9c9d6',2.3],[43,90,'✦','#ff6fb5',2.1],[22,92,'✧','#fff',1.7],[8,50,'✦','#ffd6ec',1.9],[50,62,'❤','#ff3ea0',1.5],[78,52,'✦','#fff',2.6],[90,60,'✧','#ff6fb5',2.1],[82,78,'❤','#ff3ea0',1.7],[70,30,'✦','#ffd6ec',2.3],[88,22,'✧','#fff',1.9],[58,20,'✦','#ff6fb5',1.9],[46,12,'✧','#fff',2.1],[30,18,'✦','#ffd6ec',2.3],[86,90,'✦','#fff',2.3]];
SPOTS.forEach((sp,i)=>{const el=document.createElement('span');el.className='sparkle';el.textContent=sp[2];el.style.left=sp[0]+'%';el.style.top=sp[1]+'%';el.style.color=sp[3];el.style.fontSize=sp[4]+'cqw';el.style.setProperty('--dur',(2.2+(i%5)*.4)+'s');el.style.setProperty('--delay',((i%7)*.35)+'s');sparklesBox.appendChild(el)});
function classify(t){return t.length>13?' long':t.length>10?' medium':''}
function typeLines(lines,el){el.innerHTML='';let li=0;function next(){if(li>=lines.length)return;const div=document.createElement('div');div.className='mline'+classify(lines[li]);el.appendChild(div);const txt=lines[li];let ci=0;function ch(){div.textContent=txt.slice(0,ci);ci++;if(ci<=txt.length)setTimeout(ch,TYPE_SPEED);else{li++;setTimeout(next,LINE_DELAY)}}ch()}next()}
async function playAudio(){try{if(audio.readyState<1){await new Promise(res=>{audio.addEventListener('loadedmetadata',res,{once:true});setTimeout(res,1500)})}try{audio.currentTime=AUDIO_START_TIME}catch(e){}await audio.play();if(audio.currentTime<AUDIO_START_TIME-1){try{audio.currentTime=AUDIO_START_TIME}catch(e){}}}catch(e){console.warn('Audio no disponible, la animación continúa.',e);showAudioNote()}}
function showAudioNote(){audioNote.classList.add('show');audioNote.onclick=async()=>{try{audio.currentTime=AUDIO_START_TIME;await audio.play();audioNote.classList.remove('show')}catch(e){}};setTimeout(()=>audioNote.classList.remove('show'),6000)}
function startExperience(){startBtn.disabled=true;intro.classList.add('hide');playAudio();screenEl.classList.add('on','waiting');screenGlow.classList.add('active');sparklesBox.classList.add('active');setTimeout(revealMessage,MESSAGE_DELAY)}
function revealMessage(){screenEl.classList.remove('waiting');screenEl.classList.add('revealed');typeLines(SCREEN_LINES,msgbody,function(){setTimeout(function(){screenEl.classList.add("fadeout");},850);})}
startBtn.addEventListener('click',startExperience);
</script>
</body>
</html>
